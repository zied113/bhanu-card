<!DOCTYPE html>
<html>
<head>

<title>Bhanu Partap - Digital Card</title>

.card{max-width:430px;margin:auto;background:white;min-height:100vh}

.row{padding:16px;border-bottom:1px solid #eee;font-size:18px}
.label{color:#777;font-size:14px}
.value{color:#111;font-weight:bold}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px}
a.button{display:block;padding:15px;border-radius:12px;text-decoration:none;background:#00843d;color:white;font-weight:bold}
.add{margin:20px;padding:18px;border-radius:14px;background:#ffe000;color:#111;font-size:22px;font-weight:bold;text-decoration:none;display:block}

</head>

  <div class="info">
    <div class="row"><div class="label">Office Phone</div><div class="value">+255 669 009 596</div></div>
